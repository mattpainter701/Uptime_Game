name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Backend — pytest + lint
  # =========================================================================
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short --durations=10

      - name: Upload coverage (if available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-py${{ matrix.python-version }}
          path: server/.pytest_cache/

  # =========================================================================
  # Frontend — Vitest + TypeScript check + lint
  # =========================================================================
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0 || true  # non-blocking while we build coverage

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  # =========================================================================
  # Build — verify production builds
  # =========================================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build frontend
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Verify build output
        working-directory: client
        run: |
          if [ -d dist ]; then
            echo "Build successful — $(du -sh dist | cut -f1)"
            ls -la dist/
          else
            echo "ERROR: dist/ directory not found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist/

  # =========================================================================
  # Performance budgets check
  # =========================================================================
  perf-budgets:
    name: Performance Budgets
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: client/dist/

      - name: Check bundle size budgets
        run: |
          echo "=== Bundle Size Budgets ==="

          # Max total JS budget: 2 MB
          JS_SIZE=$(find client/dist -name '*.js' -exec stat -c%s {} + | awk '{sum+=$1} END {print sum}')
          echo "Total JS: $(( JS_SIZE / 1024 )) KB (budget: 2048 KB)"
          if [ "$JS_SIZE" -gt 2097152 ]; then
            echo "❌ JS bundle exceeds 2 MB budget!"
            exit 1
          fi

          # Max total CSS budget: 500 KB
          CSS_SIZE=$(find client/dist -name '*.css' -exec stat -c%s {} + | awk '{sum+=$1} END {print sum}')
          echo "Total CSS: $(( CSS_SIZE / 1024 )) KB (budget: 512 KB)"
          if [ "$CSS_SIZE" -gt 524288 ]; then
            echo "❌ CSS bundle exceeds 512 KB budget!"
            exit 1
          fi

          # Max single asset: 1 MB
          LARGEST=$(find client/dist -type f -exec stat -c%s {} + | sort -rn | head -1)
          echo "Largest asset: $(( LARGEST / 1024 )) KB (budget: 1024 KB)"
          if [ "$LARGEST" -gt 1048576 ]; then
            echo "❌ Single asset exceeds 1 MB budget!"
            exit 1
          fi

          echo "✅ All bundle size budgets pass"
