# electron-builder configuration for NetOps Tower
# Standard distribution (non-Steam)
appId: com.netopstower.app
productName: NetOps Tower
copyright: Copyright © 2024 NetOps Tower Team

directories:
  output: release
  buildResources: electron/assets

files:
  - electron/**/*
  - client/dist/**/*
  - "!**/*.map"
  - "!**/node_modules/**/*"

extraResources:
  # Bundle the PyInstaller-built server
  - from: server/dist/netops-server
    to: server
    filter:
      - "**/*"

# Windows configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/assets/icon.ico
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  installerHeaderIcon: electron/assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NetOps Tower

# macOS configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: electron/assets/icon.icns
  category: public.app-category.education
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/assets/entitlements.mac.plist
  entitlementsInherit: electron/assets/entitlements.mac.plist

dmg:
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

# Linux configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: electron/assets
  category: Education
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  desktop:
    Name: NetOps Tower
    Comment: Network Engineering Training Game
    Categories: Education;Game;Simulation;
